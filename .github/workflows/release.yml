name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: Build distribution archives
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Verify release tag matches package version
        run: >-
          python -c "import os, pathlib, tomllib;
          version = tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'];
          tag = os.environ['GITHUB_REF_NAME'];
          assert tag == f'v{version}', f'Release tag {tag!r} must be v{version}'"

      - name: Install build tools
        run: python -m pip install build twine

      - name: Build wheel and source distribution
        run: python -m build

      - name: Check distribution metadata
        run: python -m twine check dist/*

      - name: Store distribution archives
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish:
    name: Publish distribution archives
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/iata-dangerous-goods
    permissions:
      id-token: write

    steps:
      - name: Download distribution archives
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
